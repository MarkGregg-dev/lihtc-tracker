<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Development Dashboard</title>
    <style id="dark-theme">
      body.dark { background: #0f0f0e !important; color: #e8e6df !important; }
      body.dark input, body.dark select, body.dark textarea {
        background: #1e1e1c !important; color: #e8e6df !important; border-color: #2e2e2c !important;
      }
      body.dark input::placeholder { color: #5a5a58 !important; }
      body.dark ::-webkit-scrollbar { width: 6px; }
      body.dark ::-webkit-scrollbar-track { background: #0f0f0e; }
      body.dark ::-webkit-scrollbar-thumb { background: #333331; border-radius: 3px; }
    </style>
    <script>
      (function() {
        var dark = localStorage.getItem('dark') !== 'false';
        if (dark) document.documentElement.className = 'dark-init';
        document.addEventListener('DOMContentLoaded', function() {
          if (dark) document.body.classList.add('dark');
        });
      })();
    </script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
